<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>window.devicePixelRatio</title>
  </head>
  <body>
  	<h1>window.devicePixelRatio</h1>
  	<p id="x"></p>
    <script type="text/javascript">
    console.log("window.devicePixelRatio ",window.devicePixelRatio);
    var x=document.getElementById("x");
    x.innerHTML = "window.devicePixelRatio " + window.devicePixelRatio.toString();
    </script>
  </body>
</html>
